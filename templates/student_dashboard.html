<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Student Dashboard</h1>
    <a href="{{ url_for('logout') }}">Logout</a>
</header>

<main>
    <h2>Welcome, {{ session["name"] }}</h2>
    <p>Role: {{ session["role"] }}</p>

    <h3>Course Information</h3>
    <section class="cards">
        <a class="card" href="{{ url_for('courses') }}">View Courses</a>
        <a class="card" href="{{ url_for('lesson_plans') }}">View Lesson Plans</a>
        <a class="card" href="{{ url_for('learning_objectives') }}">View Learning Objectives</a>
        <a class="card" href="{{ url_for('announcements') }}">View Announcements</a>
    </section>

    <h3>Assignments</h3>
    <section class="cards">
        <a class="card" href="{{ url_for('assignments') }}">View Assignments</a>
        <a class="card" href="{{ url_for('submit_assignment') }}">Submit Assignment</a>
    </section>

    <h3>Performance</h3>
    <section class="cards">
        <a class="card" href="{{ url_for('grades') }}">View Grades</a>
        <a class="card" href="{{ url_for('feedback') }}">View Feedback</a>
    </section>
</main>

</body>
</html>
