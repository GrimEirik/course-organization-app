<!DOCTYPE html>
<html>
<head>
    <title>Create Course</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- Create Course Page                                    -->
<!-- Allows instructors to create new course records.      -->
<!-- ===================================================== -->


<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Create Course</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>
    
<!-- ===================================================== -->
<!-- Create Course Form                                    -->
<!-- Collects course name and description for instructor-created courses. -->
<!-- ===================================================== -->
<form method="POST" class="form-box">
        <label>Course Name</label>
        <input type="text" name="course_name" required>

        <label>Description</label>
        <textarea name="description" required></textarea>

        <button type="submit">Create Course</button>
    </form>
</main>
</body>
</html>
