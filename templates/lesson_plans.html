<!DOCTYPE html>
<html>
<head>
    <title>Lesson Plans</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<!-- ===================================================== -->
<!-- Lesson Plans Page                                   -->
<!-- Displays lesson plan content created by instructors -->
<!-- ===================================================== -->



<!-- ===================================================== -->
<!-- Header Navigation Section                           -->
<!-- Displays page title and primary navigation link     -->
<!-- ===================================================== -->
<header>
    <h1>Lesson Plans</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>


<!-- ===================================================== -->
<!-- Main Content Section                                -->
<!-- Contains the primary page functionality and displayed data -->
<!-- ===================================================== -->
<main>

    
<!-- ===================================================== -->
<!-- Lesson Plan Loop                                    -->
<!-- Repeats one display card for each lesson plan record -->
<!-- ===================================================== -->
    {% for plan in lesson_plans %}

    <div class="card wide">
        <h2>{{ plan["title"] }}</h2>

        <p>
            {{ plan["content"] }}
        </p>

        <p>
            <strong>Uploaded:</strong>
            {{ plan["upload_date"] }}
        </p>
    </div>

    {% endfor %}

</main>

</body>
</html>
