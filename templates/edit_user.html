<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- Edit User Page                                        -->
<!-- Allows administrators to update existing user records and roles. -->
<!-- ===================================================== -->



<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Edit User</h1>
    <a href="{{ url_for('manage_users') }}">Back to Manage Users</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>
    
<!-- ===================================================== -->
<!-- Edit User Form                                        -->
<!-- Displays current user data and submits updates to the edit-user route. -->
<!-- ===================================================== -->
<form method="POST" class="form-box">
        <label>Name</label>
        <input type="text" name="name" value="{{ user['name'] }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ user['email'] }}" required>

        <label>Password</label>
        <input type="text" name="password" value="{{ user['password'] }}" required>

        <label>Role</label>
        <select name="role" required>
            <option value="Student" {% if user['role'] == 'Student' %}selected{% endif %}>Student</option>
            <option value="Instructor" {% if user['role'] == 'Instructor' %}selected{% endif %}>Instructor</option>
            <option value="Administrator" {% if user['role'] == 'Administrator' %}selected{% endif %}>Administrator</option>
        </select>

        <button type="submit">Save Changes</button>
    </form>
</main>

</body>
</html>
