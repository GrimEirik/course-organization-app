<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Edit User</h1>
    <a href="{{ url_for('manage_users') }}">Back to Manage Users</a>
</header>

<main>
    <form method="POST" class="form-box">
        <label>Name</label>
        <input type="text" name="name" value="{{ user['name'] }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ user['email'] }}" required>

        <label>Password</label>
        <input type="text" name="password" value="{{ user['password'] }}" required>

        <label>Role</label>
        <select name="role" required>
            <option value="Student" {% if user['role'] == 'Student' %}selected{% endif %}>Student</option>
            <option value="Instructor" {% if user['role'] == 'Instructor' %}selected{% endif %}>Instructor</option>
            <option value="Administrator" {% if user['role'] == 'Administrator' %}selected{% endif %}>Administrator</option>
        </select>

        <button type="submit">Save Changes</button>
    </form>
</main>

</body>
</html>
