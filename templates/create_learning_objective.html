<!DOCTYPE html>
<html>
<head>
    <title>Create Learning Objective</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- Create Learning Objective Page                        -->
<!-- Allows instructors to create learning objectives linked to a course. -->
<!-- ===================================================== -->


<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Create Learning Objective</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>
    
<!-- ===================================================== -->
<!-- Create Learning Objective Form                        -->
<!-- Collects a course selection and objective description. -->
<!-- ===================================================== -->
<form method="POST" class="form-box">
        <label>Course</label>
        <select name="course_id" required>
            {% for course in courses %}
                <option value="{{ course['course_id'] }}">{{ course['course_name'] }}</option>
            {% endfor %}
        </select>

        <label>Learning Objective</label>
        <textarea name="description" required></textarea>

        <button type="submit">Create Learning Objective</button>
    </form>
</main>
</body>
</html>
