<!DOCTYPE html>
<html>
<head>
    <title>Create User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- Create User Page                                      -->
<!-- Allows administrators to add new users and assign system roles. -->
<!-- ===================================================== -->



<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Create User</h1>
    <a href="{{ url_for('manage_users') }}">Back to Manage Users</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>
    
<!-- ===================================================== -->
<!-- Create User Form                                      -->
<!-- Collects new user credentials and role assignment.    -->
<!-- ===================================================== -->
<form method="POST" class="form-box">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="text" name="password" required>

        <label>Role</label>
        <select name="role" required>
            <option value="Student">Student</option>
            <option value="Instructor">Instructor</option>
            <option value="Administrator">Administrator</option>
        </select>

        <button type="submit">Create User</button>
    </form>
</main>

</body>
</html>
