<!DOCTYPE html>
<html>
<head>
    <title>Provide Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<!-- ===================================================== -->
<!-- Provide Feedback Page                               -->
<!-- Allows instructors to provide assignment feedback to students -->
<!-- ===================================================== -->


<!-- ===================================================== -->
<!-- Header Navigation Section                           -->
<!-- Displays page title and primary navigation link     -->
<!-- ===================================================== -->
<header>
    <h1>Provide Feedback</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>


<!-- ===================================================== -->
<!-- Main Content Section                                -->
<!-- Contains the primary page functionality and displayed data -->
<!-- ===================================================== -->
<main>
    
<!-- ===================================================== -->
<!-- Data Entry Form Section                             -->
<!-- Collects user input and submits it to the Flask route -->
<!-- ===================================================== -->
<form method="POST" class="form-box">
        <label>Assignment</label>
        <select name="assignment_id" required>
            {% for assignment in assignments %}
                <option value="{{ assignment['assignment_id'] }}">{{ assignment['title'] }}</option>
            {% endfor %}
        </select>

        <label>Student</label>
        <select name="student_id" required>
            {% for student in students %}
                <option value="{{ student['user_id'] }}">{{ student['name'] }}</option>
            {% endfor %}
        </select>

        <label>Feedback Comments</label>
        <textarea name="comments" required></textarea>

        <label>Post Date</label>
        <input type="date" name="post_date" required>

        <button type="submit">Provide Feedback</button>
    </form>
</main>
</body>
</html>
