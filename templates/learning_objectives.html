<!DOCTYPE html>
<html>
<head>
    <title>Learning Objectives</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <h1>Learning Objectives</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>

        </div>
    {% endfor %}
</main>
</body>
</html>
