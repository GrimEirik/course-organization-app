<!DOCTYPE html>
<html>
<head>
    <title>Learning Objectives</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<!-- ===================================================== -->
<!-- Learning Objectives Page                            -->
<!-- Displays course learning objectives pulled from the database -->
<!-- ===================================================== -->


<!-- ===================================================== -->
<!-- Header Navigation Section                           -->
<!-- Displays page title and primary navigation link     -->
<!-- ===================================================== -->
<header>
    <h1>Learning Objectives</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>


<!-- ===================================================== -->
<!-- Main Content Section                                -->
<!-- Contains the primary page functionality and displayed data -->
<!-- ===================================================== -->
<main>
    
<!-- ===================================================== -->
<!-- Learning Objective Loop                             -->
<!-- Repeats one display card for each objective record  -->
<!-- ===================================================== -->
    {% for objective in objectives %}
        <div class="card wide">
            <p>{{ objective["description"] }}</p>
        </div>
    {% endfor %}
</main>
</body>
</html>
