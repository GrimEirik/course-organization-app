<!DOCTYPE html>
<html>
<head>
    <title>Add Calendar Event</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- Add Calendar Event Page                               -->
<!-- Allows instructors to create manual calendar events that appear on the calendar. -->
<!-- ===================================================== -->



<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Add Calendar Event</h1>
    <a href="{{ url_for('calendar') }}">Back to Calendar</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>
    <div class="hero-banner">
        <h2>Create Calendar Event</h2>
        <p>Add reminders, course events, study sessions, or class schedule notes.</p>
    </div>

    
<!-- ===================================================== -->
<!-- Add Calendar Event Form                               -->
<!-- Collects event details and submits them to the calendar-event route. -->
<!-- ===================================================== -->
<form method="POST" class="form-box">
        <label>Event Title</label>
        <input type="text" name="title" required>

        <label>Description</label>
        <textarea name="description" required></textarea>

        <label>Event Date</label>
        <input type="date" name="event_date" required>

        <label>Event Type</label>
        <select name="event_type" required>
            <option value="Event / Reminder">Event / Reminder</option>
            <option value="Study Session">Study Session</option>
            <option value="Office Hours">Office Hours</option>
            <option value="No Class">No Class</option>
            <option value="Exam">Exam</option>
        </select>

        <button type="submit">Add Calendar Event</button>
    </form>
</main>


<!-- ===================================================== -->
<!-- Standard Application Footer                           -->
<!-- Provides navigation links to About, Privacy, and Contact pages. -->
<!-- ===================================================== -->

<footer>
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('privacy') }}">Privacy Statement</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</footer>

</body>
</html>
