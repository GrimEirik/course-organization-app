<!DOCTYPE html>
<html>
<head>
    <title>Create Lesson Plan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- Create Lesson Plan Page                               -->
<!-- Allows instructors to create lesson-plan records linked to a course. -->
<!-- ===================================================== -->



<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Create Lesson Plan</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>

    
<!-- ===================================================== -->
<!-- Create Lesson Plan Form                               -->
<!-- Collects lesson-plan content and links it to a course. -->
<!-- ===================================================== -->
<form method="POST" class="form-box">

        <label>Course</label>

        <select name="course_id" required>
            {% for course in courses %}
                <option value="{{ course['course_id'] }}">
                    {{ course['course_name'] }}
                </option>
            {% endfor %}
        </select>

        <label>Lesson Plan Title</label>
        <input type="text" name="title" required>

        <label>Lesson Plan Content</label>
        <textarea name="content" required></textarea>

        <label>Upload Date</label>
        <input type="date" name="upload_date" required>

        <button type="submit">
            Create Lesson Plan
        </button>

    </form>

</main>

</body>
</html>
