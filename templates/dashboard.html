<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Course Organization Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- General Dashboard Page                                -->
<!-- Legacy/common dashboard layout for basic course navigation. -->
<!-- ===================================================== -->



<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Course Organization & Management Application</h1>
    <a href="{{ url_for('logout') }}">Logout</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>
    <h2>Dashboard</h2>

    <p>Welcome, {{ session["name"] }}.</p>
    <p>Your role is: <strong>{{ session["role"] }}</strong></p>


<!-- ===================================================== -->
<!-- Dashboard Navigation Cards                            -->
<!-- Provides quick links to major application sections.   -->
<!-- ===================================================== -->
<section class="cards">
    <a class="card" href="{{ url_for('courses') }}">Courses</a>
    <a class="card" href="{{ url_for('assignments') }}">Assignments</a>
    <a class="card" href="{{ url_for('grades') }}">Grades</a>
    <a class="card" href="{{ url_for('announcements') }}">Announcements</a>
    <a class="card" href="{{ url_for('feedback') }}">Feedback</a>
</section>
</main>

</body>
</html>
