<!DOCTYPE html>
<html>
<head>
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Instructor Dashboard</h1>
    <a href="{{ url_for('logout') }}">Logout</a>
</header>

<main>
    <h2>Welcome, {{ session["name"] }}</h2>
    <p>Role: {{ session["role"] }}</p>

    <section class="cards">
        <a class="card" href="{{ url_for('courses') }}">Manage Courses</a>
        <a class="card" href="{{ url_for('assignments') }}">Manage Assignments</a>
        <a class="card" href="{{ url_for('grades') }}">Manage Grades</a>
        <a class="card" href="{{ url_for('announcements') }}">Post Announcements</a>
        <a class="card" href="{{ url_for('feedback') }}">Provide Feedback</a>
    </section>
</main>

</body>
</html>
