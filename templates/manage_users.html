<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Manage Users</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>

<main>
    <a class="card" href="{{ url_for('create_user') }}">Create New User</a>

    {% for user in users %}
        <div class="card wide">
            <h2>{{ user["name"] }}</h2>
            <p><strong>Email:</strong> {{ user["email"] }}</p>
            <p><strong>Role:</strong> {{ user["role"] }}</p>

            <p>
                <a href="{{ url_for('edit_user', user_id=user['user_id']) }}">Edit</a>
                |
                <a href="{{ url_for('delete_user', user_id=user['user_id']) }}">Delete</a>
            </p>
        </div>
    {% endfor %}
</main>

</body>
</html>
