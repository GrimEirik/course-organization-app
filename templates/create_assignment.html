<!DOCTYPE html>
<html>
<head>
    <title>Create Assignment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ===================================================== -->
<!-- Create Assignment Page                                -->
<!-- Allows instructors to create assignments linked to an existing course. -->
<!-- ===================================================== -->


<!-- ===================================================== -->
<!-- Page Header                                           -->
<!-- Displays the page title and primary navigation link.  -->
<!-- ===================================================== -->

<header>
    <h1>Create Assignment</h1>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</header>


<!-- ===================================================== -->
<!-- Main Page Content                                     -->
<!-- Contains the primary data, form, or feature content for this page. -->
<!-- ===================================================== -->

<main>
    
<!-- ===================================================== -->
<!-- Create Assignment Form                                -->
<!-- Collects assignment details and submits them to the create-assignment route. -->
<!-- ===================================================== -->
<form method="POST" class="form-box">
        <label>Course</label>
        <select name="course_id" required>
            {% for course in courses %}
                <option value="{{ course['course_id'] }}">{{ course['course_name'] }}</option>
            {% endfor %}
        </select>

        <label>Assignment Title</label>
        <input type="text" name="title" required>

        <label>Due Date</label>
        <input type="date" name="due_date" required>

        <label>Points Possible</label>
        <input type="number" name="points_possible" required>

        <button type="submit">Create Assignment</button>
    </form>
</main>
</body>
</html>
